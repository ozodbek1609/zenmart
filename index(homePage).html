<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenmart</title>

    <link rel="stylesheet" href="./public/css/homePage.css">
    <link rel="stylesheet" href="./public/css/command.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"
    >
</head>
<body>
    <div class="navbar_frame">
        <div class="container">
            <div class="navbar_top">
                <a href="index(homePage).html">
                    <img src="./public/images/zenmartLogo.png" alt="logo">
                </a>

                <div class="nav_search_frame">
                    <div class="search_box">
                        <div class="category_list">
                            <select name="" id="">
                                <option value="all" selected>All Categories</option>
                                <option value="computer">Computer</option>
                            </select>
                        </div> 
                        <input type="text" placeholder="Search products...">
                    </div>

                    <div class="search_icon_box">
                        <img src="./public/images/SearchICON.png" alt="searchIcon">
                    </div>
                </div>

                <div class="nav_top_menu">
                    <div class="top_menu_box">
                        <div class="box_icon_box">
                            <img src="./public/images/likeIcon.png" alt="">
                        </div>
                        <div class="box_info_box">
                            <span>Wishlist</span>
                            <strong>My items</strong>
                        </div>
                    </div>

                    <div class="top_menu_box">
                        <div class="box_icon_box">
                            <img src="./public/images/likeIcon.png" alt="">
                        </div>
                        <div class="box_info_box">
                            <span>Sigh in</span>
                            <strong>Account</strong>
                        </div>
                    </div>
                    
                     <div class="top_menu_box">
                        <div class="box_icon_box">
                            <div class="basket_count">2</div>
                            <img src="./public/images/likeIcon.png" alt="">
                        </div>
                        <div class="box_info_box">
                            <span>$200.99</span>
                            <strong>Total</strong>
                        </div>
                    </div>
                    
                </div>
            </div>


            <div class="navbar_bott">
                <div class="navbar_bott_menu_box">
                    <div class="browse_box">
                        <img src="./public/images/likeIcon.png" alt="">
                        <span>Browse Categories</span>
                    </div>

                    <div class="navbar_route_menu">
                        <a href="" class="title">Home</a>
                        <a href="">Shop</a>
                        <a href="">Orders</a>
                        <a href="">About</a>
                        <a href="">Contact</a>
                    </div>

                    <div class="sorting_menu">
                        <span>Deal of the Day</span>
                        <span>Hot Deals</span>
                        <span>Best Sellers</span>
                        <span>New Arrivals</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
